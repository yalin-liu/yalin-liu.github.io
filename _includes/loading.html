<!-- _includes/loading.html -->
<style>
    /* 全螢幕遮罩層 (Fullscreen Layer) */
    #loading-screen {
        position: fixed;   /* 固定定位，跟隨螢幕滾動 */
        top: 0;
        left: 0;
        width: 100vw;      /* 滿寬 */
        height: 100vh;     /* 滿高 */
        background-color: rgba(0,0,0,0.5); /* 遮罩底色 (可改為你想要的顏色，例如 #f8f9fa) */
        z-index: 9999;     /* 設定極高值，確保蓋過 Navbar、Footer 和所有網頁元件 */
        
        /* Flexbox 置中技術：將裡面的 Spinner 和文字精準置中 */
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }

    /* 預設隱藏主要內容區塊，避免在全螢幕下後面有東西露出來 */
    .dynamic-content-hidden {
        display: none;
    }

    #loading-screen > .spinner-border {
        width: 3.5rem;
        height: 3.5rem;
    }

    #lbl-loading {
        color: #FFF;
        font-size: 1.1rem;
        letter-spacing: 1px;
    }
</style>

<!-- Loading 全螢幕結構 -->
<div id="loading-screen">
    <!-- Bootstrap Spinner 動畫 -->
    <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
    </div>
    <!-- 提示文字 -->
    <p class="mt-3" id="lbl-loading">Loading...</p>
</div>

<script>
    // 萬用隱藏 Loading 函數
    window.hideLoadingScreen = function(targetSelector) {
        var selector = targetSelector || '.dynamic-content-hidden';
        
        if (window.jQuery) {
            // 使用 jQuery 淡出全螢幕遮罩，隨後淡入主內容
            $('#loading-screen').fadeOut(300, function() {
                $(selector).fadeIn(400);
            });
        } else {
            // 原生 JS 備用方案
            var loader = document.getElementById('loading-screen');
            var content = document.querySelector(selector);
            if (loader) loader.style.display = 'none';
            if (content) content.style.display = 'block';
        }
    };
</script>

{% if page.language == "en" %}
  {% assign loading_text = "Loading..." %}
{% elsif page.language == "zh-TW" %}
  {% assign loading_text = "載入中..." %}
{% else %}
  {% assign loading_text = "加载中..." %}
{% endif %}

<style>
    #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: rgba(0,0,0,0.5);
        z-index: 9999;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }

    .dynamic-content-hidden {
        display: none;
    }

    #loading-screen > .spinner-border {
        width: 3.5rem;
        height: 3.5rem;
    }

    #lbl-loading {
        color: #FFF;
        font-size: 1.1rem;
        letter-spacing: 1px;
    }
</style>

<div id="loading-screen">
    <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">{{loading_text}}</span>
    </div>
    <p class="mt-3" id="lbl-loading">{{loading_text}}</p>
</div>

<script>
    // 萬用隱藏 Loading 函數
    window.hideLoadingScreen = function(targetSelector) {
        var selector = targetSelector || '.dynamic-content-hidden';
        
        if (window.jQuery) {
            $('#loading-screen').fadeOut(1000, function() {
                $(selector).fadeIn(400);
            });
        } else {
            var loader = document.getElementById('loading-screen');
            var content = document.querySelector(selector);
            if (loader) loader.style.display = 'none';
            if (content) content.style.display = 'block';
        }
    };
</script>
